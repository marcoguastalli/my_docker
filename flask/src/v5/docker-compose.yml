
services:

  nginx:
    image: nginx:1.20.0
    container_name: marco27-flask-nginx
    ports:
      - 88:80
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/home/app/flask/project/static
      - media_volume:/home/app/flask/project/media
    depends_on:
      - flask
    networks:
      - nginx-flask

  flask:
    build:
      context: flask
      dockerfile: Dockerfile
    container_name: marco27-flask-gunicorn
    command: gunicorn --bind 0.0.0.0:5000 manage:app
    volumes:
      - static_volume:/home/app/flask/project/static
      - media_volume:/home/app/flask/project/media
    env_file:
      - ./.env
    networks:
      - nginx-flask

volumes:
  static_volume:
  media_volume:

networks:
  nginx-flask: