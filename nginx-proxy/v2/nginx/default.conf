server {
  listen       80;
  listen  [::]:80;

  return 301 https://marco27.net$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;

  server_name marco27.net;

  charset utf-8;
  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log;

  ssl_certificate /var/www/certs/server.crt;
  ssl_certificate_key /var/www/certs/server.key;
  ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
  ssl_ciphers HIGH:!aNULL:!MD5;

  add_header  X-Robots-Tag "noindex, nofollow, nosnippet, noarchive";
  add_header  X-FROM "marco27";

  root /var/www/html;
  index index.html;

  location / {
    # header used to identify the original request to the http server
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_pass  http://127.0.0.1;
    proxy_read_timeout 600;

    proxy_redirect http://127.0.0.1 https://marco27.net;
  }
}