apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-nginx-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      component: simple-nginx
  template:
    metadata:
      labels:
        component: simple-nginx
    spec:
      containers:
        - name: simple-nginx
          image: marco27/simple-nginx:v1
          ports:
            - containerPort: 80
