
services:

  nginx:
    image: nginx:stable-alpine
    container_name: marco27-web-nginx
    ports:
      - 80:80
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./www:/var/www/marco27.net
    depends_on:
      - tomcat
      - php
      - flask
    networks:
      - nginx-php
      - nginx-tomcat
      - nginx-flask

  nodejs:
    container_name: marco27-web-nodejs
    ports:
      - 8090:8090
    command: sh -c "npm install && npm run start"
    volumes:
      - ./nodejs:/var/nodejs
    environment:
      - NODE_ENV=development
    working_dir: /var/nodejs
    build:
      context: ./nodejs
      dockerfile: Dockerfile
    networks:
      - nodejs

  tomcat:
    image: tomcat:9.0.50-jdk11-openjdk-slim
    container_name: marco27-web-tomcat
    ports:
      - 8080:8080
    volumes:
      - ./sqlite/prices.sqlite:/root/prices.sqlite:rw
      - ./sqlite/sqlite-jdbc-3.34.0.jar:/usr/local/tomcat/lib/sqlite-jdbc-3.34.0.jar:rw
      - ./tomcat/server.xml:/usr/local/tomcat/conf/server.xml:rw
      - ./war/marco27-web.war:/usr/local/tomcat/webapps/marco27-web.war
    depends_on:
      - mariadb
      - mongodb
      - postgres
      - solr27
    networks:
      - nginx-tomcat
      - tomcat-mariadb
      - tomcat-mongodb
      - tomcat-solr
      - tomcat-postgres

  php:
    image: php:8.0.9-fpm-alpine
    container_name: marco27-web-php
    volumes:
      - ./www:/var/www/marco27.net
      - ./php.ini:/usr/local/etc/php/php.ini
    depends_on:
      - mariadb
    networks:
      - nginx-php
      - mariadb-php-myadmin

  flask:
    build:
      context: flask
      dockerfile: Dockerfile
    container_name: marco27-web-flask
    command: gunicorn --bind 0.0.0.0:5000 manage:app
    env_file:
      - ./.env
    networks:
      - nginx-flask

  mariadb:
    image: mariadb:10.6.3
    container_name: marco27-web-mariadb
    ports:
      - 3306:3306
    restart: unless-stopped
    command: "mysqld --init-file /data/application/init.sql"
    volumes:
      - ./mariadb-data:/var/lib/mysql
      - ./sql/init.sql:/data/application/init.sql
    environment:
      MYSQL_ROOT_PASSWORD: ${DDBB_PASSWORD:-qwerty}
    networks:
      - mariadb-php-myadmin
      - tomcat-mariadb

  phpmyadmin:
    image: phpmyadmin:5.1.1
    container_name: marco27-web-phpmyadmin
    ports:
      - 8000:80
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=mariadb
    depends_on:
      - mariadb
    networks:
      - mariadb-php-myadmin

  mongodb:
    image: library/mongo:5.0.2-focal
    container_name: marco27-web-mongo
    ports:
      - 27017-27019:27017-27019
    environment:
      MONGO_INITDB_DATABASE: local
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ADMIN_USER:-mongo-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${DDBB_PASSWORD:-qwerty}
    volumes:
      - ./mongo/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo-js:ro
      - ./mongodb-data:/data/db
    networks:
      - mongo-mongoexpress
      - tomcat-mongodb

  mongo-express:
    image: mongo-express:0.54.0
    container_name: marco27-web-mongo-express
    restart: unless-stopped
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_SERVER: marco27-web-mongo
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ADMIN_USER:-mongo-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${DDBB_PASSWORD:-qwerty}
    depends_on:
      - mongodb
    networks:
      - mongo-mongoexpress

  solr-volume-initializer:
    image: alpine
    container_name: marco27-web-solr-volume-initializer
    restart: "no"
    entrypoint: |
      /bin/sh -c "chown 8983:8983 /var/solr"
    volumes:
      - ./solr-data:/var/solr
    networks:
      - solr-zoo

  solr27:
    image: solr:8.9.0
    container_name: marco27-web-solr
    ports:
      - 8983:8983
    environment:
      - ZK_HOST=zoo27:2181
    volumes:
      - ./solr-data:/var/solr
    depends_on:
      - solr-volume-initializer
      - zoo27
    networks:
      - solr-zoo
      - tomcat-solr

  zoo27:
    image: zookeeper:3.7.0
    container_name: marco27-web-zookeeper
    restart: unless-stopped
    hostname: zoo27
    ports:
      - 2181:2181
    environment:
      ZOO_MY_ID: 1
      ZOO_SERVERS: server.1=0.0.0.0:2888:3888;2181
    networks:
      - solr-zoo

  postgres:
    image: postgres:13.3-alpine
    container_name: marco27-web-postgres
    ports:
      - 5432:5432
    restart: unless-stopped
    volumes:
      - ./postgres-data:/data/postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qwerty}
      PGDATA: /data/postgres
    networks:
      - postgres-pgadmin
      - tomcat-postgres

  pgadmin:
    image: dpage/pgadmin4:5.5
    container_name: marco27-web-pgadmin
    restart: unless-stopped
    volumes:
      - ./pgadmin-data:/root/.pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin4@pgadmin.org}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - 5050:80
    networks:
      - postgres-pgadmin

  rabbitmq:
    image: rabbitmq:3.8.14-management-alpine
    container_name: marco27-web-rabbitmq
    ports:
      - 5672:5672
      - 15672:15672
    volumes:
      - ./rabbitmq/etc/:/etc/rabbitmq/
      - ./rabbitmq/data/:/var/lib/rabbitmq/
      - ./rabbitmq/logs/:/var/log/rabbitmq/
    environment:
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-secret-token}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-qwerty}
    networks:
      - rabbitmq

volumes:
  www:
  mariadb-data:
  mongodb-data:
  postgres-data:
  pgadmin-data:
  solr-data:

networks:
  nodejs:
  nginx-php:
  nginx-tomcat:
  nginx-flask:
  mariadb-php-myadmin:
  mongo-mongoexpress:
  postgres-pgadmin:
  tomcat-mariadb:
  tomcat-mongodb:
  tomcat-postgres:
  tomcat-solr:
  solr-zoo:
  rabbitmq:
