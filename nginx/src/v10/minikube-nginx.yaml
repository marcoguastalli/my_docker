---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 2 # tells deployment to run 2 pods matching the template
  selector:
    matchLabels:
      app: nginx
  strategy:
    type: Recreate
  template: # create pods using pod definition in this template
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
  labels:
    app: nginx-app
  name: nginx-service
  namespace: default
spec:
  externalTrafficPolicy: Local
  ports:
    - name: nginx-service-http-ports
      protocol: TCP
      port: 80 # Port accessible inside cluster
      targetPort: 80 # Port to forward to inside the pod
      #nodePort: 30002  # Port accessible outside cluster
  selector:
    app: nginx-service-selector
  type: LoadBalancer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-ingress
spec:
  rules:
    - http:
        paths:
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: nginx-service
                port:
                  number: 80
          - path: /v2
            pathType: Prefix
            backend:
              service:
                name: nginx-service
                port:
                  number: 80
