
services:

  web:
    image: nginx:alpine3.18-slim
    ports:
      - 80:80
    volumes:
      - ./nginx/marco27.net.conf:/etc/nginx/conf.d/marco27.net.conf
      - ./www:/var/www/marco27.net
    depends_on:
      - php
      - mariadb

  php:
    image: php:8.3.7-fpm
    volumes:
      - ./www:/var/www/marco27.net
      - ./php.ini:/usr/local/etc/php/php.ini
    depends_on:
      - mariadb

  mariadb:
    image: mariadb:10.6.19
    restart: always
    command: "mysqld --init-file /data/application/init.sql"
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./sql/init.sql:/data/application/init.sql
    environment:
      MYSQL_DATABASE: db
      MYSQL_USER: root
      MYSQL_PASSWORD: root123
      MYSQL_ROOT_PASSWORD: root123
    networks:
      - ddbb-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5.2.1
    container_name: phpmyadmin
    ports:
      - 8000:80
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
      MYSQL_ROOT_PASSWORD: root123
    networks:
      - ddbb-network
    depends_on:
      - mariadb

volumes:
  mariadb-data:

networks:
  ddbb-network:
